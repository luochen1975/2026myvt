name: Update IPTV Sources

permissions:
  contents: write

on:
  schedule:
    - cron: '0 4,16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install aiohttp requests
    
    # 新增：清空旧输出目录，解决文件覆盖损坏问题
    - name: Clear old output files
      run: |
        rm -rf ./output
        mkdir -p ./output
    
    # 兼容脚本报错，执行完强制继续往下走，不中断流水线
    - name: Run processor
      run: python main.py || true

    # 新增：等待磁盘写入完成，避免文件未保存完毕
    - name: Wait file write finish
      run: sleep 4

    - name: Commit results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        for i in 1 2 3; do
          echo "Attempt $i: pulling remote changes..."
          if git pull origin main --rebase --autostash; then
            echo "Pull succeeded"
            break
          fi
          echo "Pull failed, waiting 5 seconds..."
          sleep 5
        done
        
        git add -A
        
        git diff --quiet && git diff --staged --quiet || git commit -m "Update IPTV sources $(date +%Y-%m-%d)"
        
        for i in 1 2 3; do
          echo "Attempt $i: pushing to remote..."
          if git push origin main; then
            echo "Push succeeded"
            break
          fi
          echo "Push failed, pulling again..."
          git pull origin main --rebase --autostash || true
          sleep 3
        done

