name: Sync to Public Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download all files from output directory
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          mkdir -p source/output
          cd source
          
          # 获取 output 目录内容
          echo "Fetching file list..."
          curl -sL -H "Authorization: token ${TOKEN}" \
               "https://api.github.com/repos/luochen1975/mytv/contents/output?ref=main" > /tmp/files.json
          
          # 显示 API 返回内容（调试用）
          echo "API response:"
          cat /tmp/files.json
          
          # 检查是否是数组（文件列表）或错误
          if grep -q '"message":"Not Found"' /tmp/files.json; then
            echo "❌ output directory not found!"
            exit 1
          fi
          
          # 提取文件名并下载
          grep -o '"name":"[^"]*"' /tmp/files.json | cut -d'"' -f4 | while read -r FILE; do
            echo "Downloading: output/$FILE"
            curl -sL -H "Authorization: token ${TOKEN}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 "https://api.github.com/repos/luochen1975/mytv/contents/output/${FILE}?ref=main" \
                 > "output/${FILE}"
            
            # 检查文件是否下载成功
            if [ -s "output/${FILE}" ]; then
              echo "✅ Downloaded: ${FILE} ($(wc -c < output/${FILE}) bytes)"
            else
              echo "⚠️ Empty file: ${FILE}"
            fi
          done
          
          # 显示下载结果
          echo "Files in output/:"
          ls -la output/

      - name: Push to public repo
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
          PUBLIC_REPO: ${{ secrets.PUBLIC_REPO }}
        run: |
          cd source
          
          # 检查是否有文件
          if [ ! "$(ls -A output/ 2>/dev/null)" ]; then
            echo "❌ No files to sync!"
            exit 1
          fi
          
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "sync output directory - $(date +%Y-%m-%d_%H:%M:%S)"
          
          git config credential.helper 'store --file=.git-credentials'
          echo "https://x-access-token:${TOKEN}@github.com" > .git-credentials
          
          git remote add public https://github.com/${PUBLIC_REPO}.git
          git push public main --force

      - name: Verify sync
        run: |
          echo "✅ 同步完成！"
          echo "📎 公开仓库地址："
          echo "https://github.com/${{ secrets.PUBLIC_REPO }}"
