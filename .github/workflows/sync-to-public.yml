name: Sync to Public Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download files from private repo
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          mkdir -p source/output
          
          curl -sL -H "Authorization: token ${TOKEN}" \
               -H "Accept: application/vnd.github.v3.raw" \
               "https://api.github.com/repos/luochen1975/mytv/contents/output/result-mobile-first.txt?ref=main" \
               > source/output/result-mobile-first.txt

      - name: Push to public repo
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
          PUBLIC_REPO: ${{ secrets.PUBLIC_REPO }}
        run: |
          cd source
          
          # 初始化 git
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "sync from private repo - $(date +%Y-%m-%d_%H:%M:%S)"
          
          # 配置 credential helper，避免 token 在 URL 中
          git config credential.helper 'store --file=.git-credentials'
          echo "https://x-access-token:${TOKEN}@github.com" > .git-credentials
          
          # 添加 remote（URL 中不带 token）
          git remote add public https://github.com/${PUBLIC_REPO}.git
          
          # 推送
          git push public main --force

      - name: Verify sync
        run: |
          echo "✅ 同步完成！"
          echo "📎 访问地址："
          echo "https://raw.githubusercontent.com/${{ secrets.PUBLIC_REPO }}/main/output/result-mobile-first.txt"
