name: Sync to Public Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Clone private repo and copy output files
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          mkdir -p source/output
          
          echo "Cloning private repository..."
          git clone --depth 1 --branch main \
            "https://x-access-token:${TOKEN}@github.com/luochen1975/mytv.git" \
            /tmp/mytv
          
          # 验证 output 目录
          if [ ! -d "/tmp/mytv/output" ]; then
            echo "❌ output directory not found"
            ls -la /tmp/mytv/
            exit 1
          fi
          
          # 复制文件（保留目录结构）
          cp -r /tmp/mytv/output/* source/output/
          
          echo "✅ Files copied:"
          ls -la source/output/

      - name: Push to public repo
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
          PUBLIC_REPO: ${{ secrets.PUBLIC_REPO }}
        run: |
          cd source
          
          git init
          git checkout -b main 2>/dev/null || git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "sync output directory - $(date +%Y-%m-%d_%H:%M:%S)"
          
          # 推送到目标仓库
          git remote add public "https://x-access-token:${TOKEN}@github.com/${PUBLIC_REPO}.git"
          git push public main --force
          
          echo "✅ Sync completed"

      - name: Verify sync
        run: |
          echo "📎 Public repo: https://github.com/${{ secrets.PUBLIC_REPO }}"
