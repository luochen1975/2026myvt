name: Sync to Public Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download all files from output directory
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          mkdir -p source/output
          
          # 获取文件列表（确保 header 格式正确）
          echo "Fetching file list..."
          HTTP_CODE=$(curl -sL \
               -H "Authorization: Bearer ${TOKEN}" \
               -H "Accept: application/vnd.github+json" \
               -w "%{http_code}" \
               -o /tmp/files.json \
               "https://api.github.com/repos/luochen1975/mytv/contents/output?ref=main")
          
          echo "HTTP Code: $HTTP_CODE"
          echo "Response:"
          cat /tmp/files.json
          
          # 检查是否限流
          if grep -q '"API rate limit exceeded"' /tmp/files.json; then
            echo "❌ Rate limit exceeded. Token may not be working."
            exit 1
          fi
          
          # 检查 HTTP 状态
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ API request failed with code $HTTP_CODE"
            exit 1
          fi
          
          # 提取文件名
          FILES=$(cat /tmp/files.json | jq -r '.[].name' 2>/dev/null || \
                grep -o '"name":"[^"]*"' /tmp/files.json | cut -d'"' -f4)
          
          if [ -z "$FILES" ]; then
            echo "❌ No files found"
            exit 1
          fi
          
          echo "Files to download:"
          echo "$FILES"
          echo "---"
          
          # 下载每个文件（使用 Bearer 认证）
          echo "$FILES" | while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            
            echo "Downloading: $FILE"
            curl -sL \
                 -H "Authorization: Bearer ${TOKEN}" \
                 -H "Accept: application/vnd.github.v3.raw" \
                 -o "source/output/${FILE}" \
                 "https://api.github.com/repos/luochen1975/mytv/contents/output/${FILE}?ref=main"
            
            if [ ! -s "source/output/${FILE}" ]; then
              echo "❌ Failed to download: $FILE"
              exit 1
            fi
            
            echo "  ✅ $(wc -c < "source/output/${FILE}") bytes"
          done
          
          echo "All files downloaded:"
          ls -la source/output/

      - name: Push to public repo
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
          PUBLIC_REPO: ${{ secrets.PUBLIC_REPO }}
        run: |
          cd source
          
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "sync output directory - $(date +%Y-%m-%d_%H:%M:%S)"
          
          git config credential.helper 'store --file=.git-credentials'
          echo "https://x-access-token:${TOKEN}@github.com" > .git-credentials
          
          git remote add public https://github.com/${PUBLIC_REPO}.git
          git push public main --force

      - name: Verify sync
        run: |
          echo "✅ 同步完成！"
          echo "📎 公开仓库地址："
          echo "https://github.com/${{ secrets.PUBLIC_REPO }}"
