          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "sync from private repo - $(date +%Y-%m-%d_%H:%M:%S)"
          
          # 将 master 重命名为 main
          git branch -m master main
          
          # 推送到公开仓库
          git push https://x-access-token:${TOKEN}@github.com/${PUBLIC_REPO}.git main --force
